version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: uni-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: uni_db
      MYSQL_USER: uni_user
      MYSQL_PASSWORD: uni_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/src/main/resources/db/init-data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
      - ./backend/src/main/resources/db/init-notification.sql:/docker-entrypoint-initdb.d/03-init-notification.sql
      - ./backend/src/main/resources/db/init-social.sql:/docker-entrypoint-initdb.d/04-init-social.sql
      - ./backend/src/main/resources/db/init-badge.sql:/docker-entrypoint-initdb.d/05-init-badge.sql
      - ./backend/src/main/resources/db/init-water.sql:/docker-entrypoint-initdb.d/06-init-water.sql
      - ./backend/src/main/resources/db/init-sleep.sql:/docker-entrypoint-initdb.d/07-init-sleep.sql
      - ./backend/src/main/resources/db/init-theme.sql:/docker-entrypoint-initdb.d/08-init-theme.sql
      - ./backend/src/main/resources/db/init-ai-assistant.sql:/docker-entrypoint-initdb.d/09-init-ai-assistant.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - uni-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 缓存
  redis:
    image: redis:7.0-alpine
    container_name: uni-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass redis123456
    networks:
      - uni-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uni-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=uni_db
      - DB_USER=uni_user
      - DB_PASSWORD=uni_pass123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123456
      - JWT_SECRET=uni-jwt-secret-key-2024-please-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uni-network
    volumes:
      - upload_files:/app/uploads

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  upload_files:
    driver: local

networks:
  uni-network:
    driver: bridge
