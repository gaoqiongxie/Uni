# 生产环境配置
spring:
  application:
    name: uni-app

  # 数据源配置 - 从环境变量读取
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:uni_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USER:uni_user}
    password: ${DB_PASSWORD:uni_pass123}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  # Redis配置 - 从环境变量读取
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# Server配置
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    min-spare-threads: 20

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.uni.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# 应用自定义配置
app:
  jwt:
    secret: ${JWT_SECRET:uni-jwt-secret-key-2024-please-change-in-production}
    expire: 7200
    refresh-expire: 604800

  qiniu:
    access-key: ${QINIU_ACCESS_KEY:}
    secret-key: ${QINIU_SECRET_KEY:}
    bucket: ${QINIU_BUCKET:uni-app}
    domain: ${QINIU_DOMAIN:}

  sms:
    access-key: ${SMS_ACCESS_KEY:}
    secret-key: ${SMS_SECRET_KEY:}
    template-code: ${SMS_TEMPLATE_CODE:}
    sign-name: ${SMS_SIGN_NAME:轻瘦App}

  file:
    upload-path: /app/uploads

  defaults:
    calorie-goal: 1400
    weight-record-days: 90

# Swagger文档配置 - 生产环境关闭
knife4j:
  enable: false

# 日志配置 - 生产环境级别
logging:
  level:
    com.uni: INFO
    org.springframework.web: WARN
    com.baomidou.mybatisplus: INFO
  file:
    name: /app/logs/uni-app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
